<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSHI STREAM - TV & RADIO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* --- DESIGN GLOBAL (DARK MODE) --- */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-color: #58a6ff; /* Bleu moderne */
            --accent-color: #2ea043;  /* Vert succès */
            --text-main: #c9d1d9;
            --text-sub: #8b949e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- EN-TÊTE --- */
        header {
            background-color: var(--card-bg);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #30363d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        /* --- CONTENEUR PRINCIPAL --- */
        .container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- LECTEUR TV --- */
        .video-section {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            background-color: black;
        }

        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .video-subtitle {
            font-size: 12px;
            color: var(--text-sub);
        }

        .live-tag {
            background-color: #da3633;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-right: 5px;
        }

        /* --- SECTION RADIO --- */
        .radio-section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #30363d;
        }

        .radio-section h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .station-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .station-card {
            background-color: #21262d;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .station-card:hover, .station-card.active {
            border-color: var(--accent-color);
            background-color: #2a3039;
        }

        .station-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .station-name {
            font-size: 14px;
            font-weight: 500;
        }

        /* --- LECTEUR AUDIO CACHÉ --- */
        audio { display: none; }

        /* --- BAS DE PAGE (NAVIAGTION FIXE) --- */
        footer {
            background-color: var(--card-bg);
            border-top: 1px solid #30363d;
            padding: 10px;
            position: sticky;
            bottom: 0;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 -4px 6px rgba(0,0,0,0.3);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .nav-btn.active {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 20px;
        }

        /* Responsive : Ajustements pour PC */
        @media (min-width: 600px) {
            header h1 { font-size: 24px; }
            .station-list { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Lushi Stream ⚡</h1>
    </header>

    <div class="container" id="main-container">
        
        <div id="tv-section" class="content-section">
            <div class="video-section">
                <div class="video-wrapper">
                    <video id="tvPlayer" controls autoplay playsinline poster="https://static.france24.com/live/F24_FR_HI_HLS/thumbnail.jpg"></video>
                </div>
                <div class="video-info">
                    <div class="video-title">
                        <span class="live-tag">DIRECT</span> France 24 Infos
                    </div>
                    <div class="video-subtitle">Qualité : Auto (HLS) | Lubumbashi Relais</div>
                </div>
            </div>
        </div>

        <div id="radio-section" class="content-section" style="display: none;">
            <div class="radio-section">
                <h2>📻 Stations Disponibles</h2>
                <div class="station-list">
                    <div class="station-card" onclick="playRadio('https://rfi-afrique-64k.akacast.akamaistream.net/7/463/144103/v1/rc.akacast.akamaistream.net/rfi_afrique_64k', this)">
                        <div class="station-icon">🌍</div>
                        <div class="station-name">RFI Afrique</div>
                    </div>
                    <div class="station-card" onclick="playRadio('https://bbc-bbcws-afrique.akacast.akamaistream.net/7/24/144101/v1/rc.akacast.akamaistream.net/bbc_bbcws_afrique', this)">
                        <div class="station-icon">🎙️</div>
                        <div class="station-name">BBC Afrique</div>
                    </div>
                    <div class="station-card" onclick="playRadio('http://icecast.rtl.fr/rtl-1-44-128?listen=webkey', this)">
                        <div class="station-icon">🎵</div>
                        <div class="station-name">RTL France</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <audio id="audioPlayer"></audio>

    <footer>
        <button class="nav-btn active" onclick="showSection('tv')" id="nav-tv">
            <span class="nav-icon">📺</span>
            <span>TV en Direct</span>
        </button>
        <button class="nav-btn" onclick="showSection('radio')" id="nav-radio">
            <span class="nav-icon">📻</span>
            <span>Radio FM</span>
        </button>
    </footer>

    <script>
        const tvPlayer = document.getElementById('tvPlayer');
        const audioPlayer = document.getElementById('audioPlayer');
        const tvSection = document.getElementById('tv-section');
        const radioSection = document.getElementById('radio-section');
        const navTv = document.getElementById('nav-tv');
        const navRadio = document.getElementById('nav-radio');

        // URL du flux TV (France 24)
        const tvUrl = "https://static.france24.com/live/F24_FR_HI_HLS/live_tv.m3u8";

        // --- 1. Initialisation du Lecteur TV (HLS) ---
        function initTv() {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(tvUrl);
                hls.attachMedia(tvPlayer);
            } else if (tvPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                // Pour Safari
                tvPlayer.src = tvUrl;
            }
        }

        // --- 2. Gestionnaire Radio ---
        function playRadio(url, card) {
            // Arréter la TV
            tvPlayer.pause();
            
            // Gestion visuelle de la carte active
            document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            
            // Lancer l'audio
            audioPlayer.src = url;
            audioPlayer.play();
        }

        // --- 3. Gestion de la Navigation ---
        function showSection(section) {
            // Cacher toutes les sections
            tvSection.style.display = 'none';
            radioSection.style.display = 'none';
            navTv.classList.remove('active');
            navRadio.classList.remove('active');

            if (section === 'tv') {
                tvSection.style.display = 'block';
                navTv.classList.add('active');
                audioPlayer.pause(); // Arrêter la radio si on passe à la TV
            } else if (section === 'radio') {
                radioSection.style.display = 'block';
                navRadio.classList.add('active');
                // On n'arrête pas la TV ici, elle se mettra en pause si on clique sur une radio
            }
        }

        // Démarrer la TV au chargement
        initTv();
    </script>

</body>
</html>
