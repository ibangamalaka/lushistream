<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSHI RADIO PRO - 50 STATIONS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e14;
            --card: #161d27;
            --accent: #00d2ff;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* --- LECTEUR AUDIO FIXE (HAUT) --- */
        .audio-player {
            background: linear-gradient(145deg, #1e2733, #161d27);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .visualizer {
            font-size: 50px; color: var(--accent);
            margin-bottom: 10px;
            animation: pulse 1.5s infinite ease-in-out;
            display: none; /* Apparaît quand on joue */
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        #current-station { font-size: 1.2rem; font-weight: bold; margin: 10px 0; color: var(--accent); }
        #status { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        /* --- GRILLE DES 50 RADIOS --- */
        .stations-container {
            flex: 1; overflow-y: auto; padding: 20px;
            background: #0d121a;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .radio-card {
            background: var(--card);
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #252d3a;
            transition: 0.3s;
        }

        .radio-card:active { transform: scale(0.9); }
        .radio-card.active { border-color: var(--accent); background: #1c2635; box-shadow: 0 0 10px var(--accent); }
        
        .radio-card i { font-size: 28px; color: #505d6e; margin-bottom: 10px; display: block; }
        .radio-card.active i { color: var(--accent); }
        
        .radio-card span { font-size: 11px; font-weight: 600; display: block; }

        /* Barre de recherche */
        .search-box {
            padding: 10px 20px; background: #161d27;
        }
        input {
            width: 100%; padding: 12px; border-radius: 25px; border: none;
            background: #0a0e14; color: white; outline: none; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="audio-player">
        <div id="viz" class="visualizer"><i class="fas fa-wave-square"></i></div>
        <div id="status">Sélectionnez une station</div>
        <div id="current-station">LUSHI RADIO</div>
        <audio id="player" controls style="width: 100%; margin-top: 15px;"></audio>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Rechercher une radio..." onkeyup="filterRadios()">
    </div>

    <div class="stations-container">
        <div class="grid" id="radioGrid">
            </div>
    </div>

<script>
    // LISTE DES RADIOS (Voici les premières, tu peux copier-coller pour arriver à 50)
    const radioList = [
        { name: "RFI Afrique", url: "https://rfi-afrique-64k.akacast.akamaistream.net/7/463/144103/v1/rc.akacast.akamaistream.net/rfi_afrique_64k" },
        { name: "BBC Afrique", url: "https://bbc-bbcws-afrique.akacast.akamaistream.net/7/24/144101/v1/rc.akacast.akamaistream.net/bbc_bbcws_afrique" },
        { name: "Radio Okapi", url: "https://stream.okapifm.net/okapifm.mp3" },
        { name: "Africa No 1", url: "http://stats.vps-private.net:8140/stream" },
        { name: "VOA Afrique", url: "https://voa-28.akacast.akamaistream.net/7/751/437731/v1/rc.akacast.akamaistream.net/voa-28" },
        { name: "TV5 Afrique", url: "https://radio.tv5monde.com/tv5mondeafrique.mp3" },
        { name: "RTL France", url: "http://icecast.rtl.fr/rtl-1-44-128?listen=webkey" },
        { name: "Europe 1", url: "http://stream.europe1.fr/europe1.mp3" },
        { name: "France Info", url: "https://stream.radiofrance.fr/franceinfo/franceinfo.m3u8" },
        { name: "Radio Lushi", url: "https://stream.radio.co/s6f1b3f9d5/listen" },
        // Ajoute tes autres radios ici sur le même modèle jusqu'à 50
    ];

    const player = document.getElementById('player');
    const statusText = document.getElementById('status');
    const stationText = document.getElementById('current-station');
    const viz = document.getElementById('viz');
    const grid = document.getElementById('radioGrid');

    function loadRadios() {
        grid.innerHTML = "";
        radioList.forEach((radio, index) => {
            const card = document.createElement('div');
            card.className = 'radio-card';
            card.innerHTML = `<i class="fas fa-radio"></i><span>${radio.name}</span>`;
            card.onclick = () => playRadio(radio.url, radio.name, card);
            grid.appendChild(card);
        });
    }

    function playRadio(url, name, card) {
        // UI
        document.querySelectorAll('.radio-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        stationText.innerText = name;
        statusText.innerText = "Connexion...";
        viz.style.display = "block";

        // Logic
        player.src = url;
        player.play().then(() => {
            statusText.innerText = "En direct";
        }).catch(e => {
            statusText.innerText = "Erreur de flux";
            viz.style.display = "none";
        });
    }

    function filterRadios() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('radio-card');
        for (let card of cards) {
            let name = card.getElementsByTagName('span')[0].innerText.toLowerCase();
            card.style.display = name.includes(input) ? "block" : "none";
        }
    }

    window.onload = loadRadios;
</script>
</body>
</html>
