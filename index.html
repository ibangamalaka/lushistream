<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSHI RADIO 50</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050a10; --card: #121821; --accent: #00d2ff; --red: #ff4b2b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Lecteur Fixe */
        .header-player { background: var(--card); padding: 25px 15px; text-align: center; border-bottom: 3px solid var(--accent); }
        .logo-lushi { font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 5px; }
        #status { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        #current-name { font-size: 18px; font-weight: bold; min-height: 24px; }
        audio { width: 100%; margin-top: 15px; height: 35px; }

        /* Recherche */
        .search-area { padding: 10px; background: #0a111a; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1a2433; color: white; outline: none; box-sizing: border-box; }

        /* Grille des 50 Radios */
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .radio-item { background: var(--card); border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .radio-item:active { transform: scale(0.95); }
        .radio-item.active { border-color: var(--accent); background: #1a2433; }
        .radio-item i { font-size: 25px; color: #444; margin-bottom: 8px; display: block; }
        .radio-item.active i { color: var(--accent); }
        .radio-item span { font-size: 10px; font-weight: 600; display: block; }
    </style>
</head>
<body>

<div class="header-player">
    <div class="logo-lushi">LUSHI RADIO PRO</div>
    <div id="status">Prêt à diffuser</div>
    <div id="current-name">Sélectionnez une station</div>
    <audio id="audioPlayer" controls></audio>
</div>

<div class="search-area">
    <input type="text" id="q" placeholder="Chercher parmi les 50 radios..." onkeyup="search()">
</div>

<div class="scroll-area">
    <div class="grid" id="grid"></div>
</div>

<script>

    // INTERNATIONAL (15)
    {n: "RTL France", u: "http://icecast.rtl.fr/rtl-1-44-128?listen=webkey"},
    {n: "Europe 1", u: "http://stream.europe1.fr/europe1.mp3"},
    {n: "France Info", u: "http://direct.franceinfo.fr/live/franceinfo-midfi.mp3"},
    {n: "France Inter", u: "http://direct.franceinter.fr/live/franceinter-midfi.mp3"},

    {n: "Salsa Radio", u: "http://strm112.1.fm/salsa_mobile_mp3"},

    {n: "Radio Meuh", u: "http://radiomeuh.ice.infomaniak.ch/radiomeuh-128.mp3"},
    {n: "FIP Radio", u: "http://direct.fipradio.fr/live/fip-midfi.mp3"},
    {n: "Radio FG", u: "http://radiofg.impek.com/fg"},
    {n: "Latina", u: "http://broadcast.infomaniak.ch/latina-high.mp3"},
    {n: "Cherie FM", u: "http://cdn.nrjaudio.fm/adwapi/php/wm/get.php?id=3"}
];

const grid = document.getElementById('grid');
const player = document.getElementById('audioPlayer');
const nameDisp = document.getElementById('current-name');
const statusDisp = document.getElementById('status');

function load() {
    grid.innerHTML = "";
    radios.forEach((r, i) => {
        const d = document.createElement('div');
        d.className = 'radio-item';
        d.innerHTML = `<i class="fas fa-broadcast-tower"></i><span>${r.n}</span>`;
        d.onclick = () => play(r.u, r.n, d);
        grid.appendChild(d);
    });
}

function play(url, name, el) {
    document.querySelectorAll('.radio-item').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    nameDisp.innerText = name;
    statusDisp.innerText = "Chargement...";
    player.src = url;
    player.play().then(() => statusDisp.innerText = "En direct").catch(() => statusDisp.innerText = "Erreur de flux");
}

function search() {
    const val = document.getElementById('q').value.toLowerCase();
    document.querySelectorAll('.radio-item').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
    });
}

window.onload = load;
</script>
</body>
</html>
