<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSHI TV - 50 CHAINES</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #e50914; --bg: #000; --card: #181818; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .player-box { position: sticky; top: 0; z-index: 1000; width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        .info { padding: 10px 15px; background: #111; font-size: 13px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .content { padding: 15px; }
        .search-box { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #222; color: white; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .card { background: var(--card); border-radius: 8px; padding: 12px 5px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .card.active { border-color: var(--main); background: #222; }
        .card i { font-size: 20px; margin-bottom: 8px; color: var(--main); display: block; }
        .card span { font-size: 10px; font-weight: bold; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="player-box">
    <video id="player" controls autoplay playsinline></video>
</div>

<div class="info">
    <span id="ch-name">Chargement...</span>
    <span id="status" style="color: #00d2ff;">Prêt</span>
</div>

<div class="content">
    <div class="search-box">
        <input type="text" id="search" placeholder="Chercher une chaîne (50 disponibles)..." onkeyup="filter()">
    </div>
    <div id="grid" class="grid"></div>
</div>

const video = document.getElementById('player');
const chName = document.getElementById('ch-name');
const status = document.getElementById('status');
const grid = document.getElementById('grid');
let hls = new Hls();

function load() {
    grid.innerHTML = "";
    tvList.forEach((tv, index) => {
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML = `<i class="fas fa-play-circle"></i><span>${tv.n}</span>`;
        d.onclick = () => play(tv.u, tv.n, d);
        grid.appendChild(d);
        if(index === 0) play(tv.u, tv.n, d);
    });
}

function play(url, name, el) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    chName.innerText = name;
    status.innerText = "Chargement...";

    if (hls) hls.destroy();
    if (Hls.isSupported()) {
        hls = new Hls({ lowLatencyMode: true });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); status.innerText = "EN DIRECT"; });
    } else {
        video.src = url;
        video.play();
    }
}

function filter() {
    const s = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(s) ? "block" : "none";
    });
}

window.onload = load;
</script>
</body>
