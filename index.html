<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSHI STREAM PRO - FAST</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #e50914; --bg: #000; --card: #141414; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .player-wrapper { width: 100%; position: sticky; top: 0; z-index: 1000; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        .main-content { padding: 15px; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .card { background: var(--card); border-radius: 10px; padding: 15px 5px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .card.active { border-color: var(--red); }
        .card img { width: 40px; height: 40px; margin-bottom: 8px; }
        .card span { font-size: 11px; font-weight: bold; display: block; }
        .status-msg { font-size: 12px; color: #ffcc00; text-align: center; padding: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; font-size: 12px; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--red); }
    </style>
</head>
<body>

<div class="player-wrapper">
    <video id="videoPlayer" controls playsinline></video>
    <div id="status" class="status-msg">Initialisation...</div>
</div>

<div class="main-content">
    <div id="grid" class="grid"></div>
</div>

<nav>
    <div class="nav-item active" onclick="loadTab('tv')"><i class="fas fa-tv"></i><br>TV</div>
    <div class="nav-item" onclick="loadTab('radio')"><i class="fas fa-radio"></i><br>Radio</div>
</nav>

<script>
    const channels = {
        tv: [
            { name: "France 24", url: "https://static.france24.com/live/F24_FR_HI_HLS/live_tv.m3u8", img: "https://upload.wikimedia.org/wikipedia/commons/e/e9/France_24_logo.svg" },
            { name: "Africa 24", url: "https://live.africa24tv.com/africa24/smil:africa24.smil/playlist.m3u8", img: "https://www.africa24tv.com/images/logo.png" }
        ],
        radio: [
            { name: "RFI Afrique", url: "https://rfi-afrique-64k.akacast.akamaistream.net/7/463/144103/v1/rc.akacast.akamaistream.net/rfi_afrique_64k", img: "https://upload.wikimedia.org/wikipedia/fr/c/c2/RFI_logo.svg" }
        ]
    };

    const video = document.getElementById('videoPlayer');
    const status = document.getElementById('status');
    let hls = null;

    function play(url, card) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        if(card) card.classList.add('active');
        
        status.innerText = "Chargement du flux...";

        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls({
                lowLatencyMode: true,
                backBufferLength: 30,
                manifestLoadingMaxRetry: 5
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                status.innerText = "Lecture en cours";
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    status.innerText = "Erreur réseau. Reconnexion...";
                    hls.startLoad();
                }
            });
        } else {
            video.src = url;
            video.play();
        }
    }

    function loadTab(type) {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        channels[type].forEach((ch, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${ch.img}"><span>${ch.name}</span>`;
            card.onclick = () => play(ch.url, card);
            grid.appendChild(card);
            if(index === 0 && type === 'tv') play(ch.url, card);
        });
    }

    window.onload = () => loadTab('tv');
</script>
</body>
</html>
