<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSHI INNOVATION TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --accent: #e50914; --bg: #050505; }
        
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Ecran de diffusion */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 100; }
        video { width: 100%; height: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }

        /* Infos programme */
        .channel-bar { padding: 15px; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .live-badge { background: var(--accent); color: white; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        .video-info { padding: 20px; }
        h1 { font-size: 1.2rem; margin: 0 0 5px 0; color: var(--primary); }
        p { font-size: 0.9rem; color: #888; margin: 0; }

        /* Liste de lecture */
        .playlist { padding: 0 20px 20px 20px; }
        .playlist-title { font-size: 14px; color: #555; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        .video-item { 
            display: flex; align-items: center; gap: 15px; background: #151515; 
            padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer;
            border-left: 4px solid transparent; transition: 0.3s;
        }
        .video-item.active { border-left-color: var(--primary); background: #1a1a1a; }
        .video-item i { font-size: 20px; color: #333; }
        .video-item.active i { color: var(--primary); }
        .video-item b { font-size: 14px; display: block; }
        .video-item span { font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="tvPlayer" controls autoplay playsinline></video>
    </div>

    <div class="channel-bar">
        <div id="playing-title">Initialisation...</div>
        <div class="live-badge">● EN DIRECT</div>
    </div>

    <div class="video-info">
        <h1 id="current-h1">Chargement...</h1>
        <p id="current-desc">Préparation de votre flux d'innovation.</p>
    </div>

    <div class="playlist">
        <div class="playlist-title">Grille des programmes</div>
        <div id="playlist-list"></div>
    </div>

    <script>
        // CONFIGURATION DES VIDÉOS (Utilisation de Cloudinary)
        const playlist = [
            {
                title: "Concours Lépine : Inventeurs",
                desc: "Inspirations et inventions françaises célèbres.",
                url: "https://res.cloudinary.com/dsnf7punm/video/upload/q_auto,f_auto/v1778110506/Concours_L%C3%A9pine_Les_inventeurs_fran%C3%A7ais_odmqrf.mp4"
            },
            {
                title: "Big Buck Bunny (Animation)",
                desc: "Vidéo de test pour vérifier l'enchaînement.",
                url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
            }
        ];

        const player = document.getElementById('tvPlayer');
        const listUI = document.getElementById('playlist-list');
        let currentIndex = 0;

        // Fonction pour lancer une vidéo
        function playTrack(index) {
            currentIndex = index;
            const track = playlist[index];
            
            player.src = track.url;
            document.getElementById('playing-title').innerText = "DIFFUSION : " + track.title;
            document.getElementById('current-h1').innerText = track.title;
            document.getElementById('current-desc').innerText = track.desc;
            
            player.play();
            renderPlaylist();
        }

        // AUTOMATE : Passer à la vidéo suivante quand celle-ci est finie
        player.onended = function() {
            currentIndex = (currentIndex + 1) % playlist.length;
            playTrack(currentIndex);
        };

        // Mise à jour visuelle de la liste
        function renderPlaylist() {
            listUI.innerHTML = "";
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `video-item ${index === currentIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <i class="fas ${index === currentIndex ? 'fa-play-circle' : 'fa-film'}"></i>
                    <div>
                        <b>${track.title}</b>
                        <span>${index === currentIndex ? 'En cours...' : 'À suivre'}</span>
                    </div>
                `;
                item.onclick = () => playTrack(index);
                listUI.appendChild(item);
            });
        }

        // Lancement au démarrage
        window.onload = () => playTrack(0);

    </script>
</body>
</html>
