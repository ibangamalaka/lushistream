<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSHI STREAM PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --main-red: #e50914;
            --bg-dark: #050505;
            --card-bg: #141414;
            --accent: #00d2ff;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* Lecteur Vidéo Optimisé */
        .player-container {
            width: 100%;
            background: #000;
            position: sticky; top: 0; z-index: 1000;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 20px rgba(0,0,0,0.9);
        }

        video { width: 100%; height: 100%; display: block; }

        /* Status Bar */
        .status-bar {
            background: #111;
            padding: 8px 15px;
            font-size: 12px;
            border-bottom: 1px solid #222;
            color: var(--accent);
            display: flex; justify-content: space-between;
        }

        /* Grille des chaînes */
        .content { padding: 15px; padding-bottom: 90px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .card:active { transform: scale(0.95); }
        .card.active { border-color: var(--main-red); background: #1f1f1f; }
        
        .card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
        .card i { font-size: 30px; color: var(--accent); margin-bottom: 8px; display: block; }
        .card span { font-size: 11px; font-weight: bold; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Navigation Basse */
        nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid #333; z-index: 1001;
        }

        .nav-item { color: #666; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--main-red); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="mainPlayer" controls playsinline></video>
    </div>

    <div class="status-bar">
        <span id="ch-name">Sélectionnez une chaîne</span>
        <span id="ch-status">PRÊT</span>
    </div>

    <div class="content">
        <div id="grid" class="grid"></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('tv', this)">
            <i class="fas fa-desktop"></i><span>TÉLÉ</span>
        </div>
        <div class="nav-item" onclick="switchTab('radio', this)">
            <i class="fas fa-broadcast-tower"></i><span>RADIO</span>
        </div>
        <div class="nav-item" onclick="location.reload()">
            <i class="fas fa-redo"></i><span>REFRESH</span>
        </div>
    </nav>

<script>
    // Liste des flux corrigés
    const channels = {
        tv: [
            { name: "France 24", url: "https://static.france24.com/live/F24_FR_HI_HLS/live_tv.m3u8", img: "https://upload.wikimedia.org/wikipedia/commons/e/e9/France_24_logo.svg" },
            { name: "Africa 24", url: "https://live.africa24tv.com/africa24/smil:africa24.smil/playlist.m3u8", img: "https://www.africa24tv.com/images/logo.png" },
            { name: "TV5 Monde", url: "https://ott.tv5monde.com/content/vtv/tv5monde_afrique/index.m3u8", img: "https://upload.wikimedia.org/wikipedia/commons/4/4b/TV5MONDE_logo.svg" },
            { name: "Euronews", url: "https://euronews-euronews-french-p6-vpod.pdt.ovh/200/index.m3u8", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/Euronews_logo_2016.svg" }
        ],
        radio: [
            { name: "RFI Afrique", url: "https://rfi-afrique-64k.akacast.akamaistream.net/7/463/144103/v1/rc.akacast.akamaistream.net/rfi_afrique_64k", icon: "fa-earth-africa" },
            { name: "BBC Afrique", url: "https://bbc-bbcws-afrique.akacast.akamaistream.net/7/24/144101/v1/rc.akacast.akamaistream.net/bbc_bbcws_afrique", icon: "fa-microphone-alt" },
            { name: "Radio Okapi", url: "https://stream.okapifm.net/okapifm.mp3", icon: "fa-radio" }
        ]
    };

    const video = document.getElementById('mainPlayer');
    const chNameDisp = document.getElementById('ch-name');
    const chStatusDisp = document.getElementById('ch-status');
    const grid = document.getElementById('grid');
    let hls = null;

    function play(url, name, card) {
        // Mise à jour interface
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        if(card) card.classList.add('active');
        chNameDisp.innerText = name;
        chStatusDisp.innerText = "CHARGEMENT...";

        // Nettoyage de l'ancien flux
        if (hls) {
            hls.destroy();
            hls = null;
        }

        if (Hls.isSupported() && url.includes('m3u8')) {
            hls = new Hls({
                lowLatencyMode: true,
                manifestLoadingMaxRetry: 10,
                enableWorker: true
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                chStatusDisp.innerText = "EN DIRECT";
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    chStatusDisp.innerText = "ERREUR RÉSEAU";
                    hls.startLoad();
                }
            });
        } else {
            // Pour les MP3 (Radio) ou navigateurs type Safari
            video.src = url;
            video.play().then(() => {
                chStatusDisp.innerText = "EN DIRECT";
            }).catch(e => {
                chStatusDisp.innerText = "CLIQUEZ PLAY";
            });
        }
    }

    function switchTab(type, el) {
        // Style onglets
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');

        // Génération grille
        grid.innerHTML = "";
        channels[type].forEach((ch, index) => {
            const div = document.createElement('div');
            div.className = 'card';
            if (type === 'tv') {
                div.innerHTML = `<img src="${ch.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716429.png'"><span>${ch.name}</span>`;
            } else {
                div.innerHTML = `<i class="fas ${ch.icon}"></i><span>${ch.name}</span>`;
            }
            div.onclick = () => play(ch.url, ch.name, div);
            grid.appendChild(div);
        });
    }

    // Lancement par défaut
    window.onload = () => {
        switchTab('tv', document.querySelector('.nav-item'));
        // Optionnel : Lancer la 1ère chaîne TV automatiquement
        if(channels.tv.length > 0) {
            play(channels.tv[0].url, channels.tv[0].name, null);
        }
    };
</script>
</body>
</html>
